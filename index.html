<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوامر الشبكة — لوحة تحكم المبيعات</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Outfit:wght@400;600;800&family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="dark-mode">

    <!-- 1. Start Overlay (Initial Interaction) -->
    <div id="start-overlay">
        <div class="start-overlay-content">
            <div class="start-overlay-icon">🚀</div>
            <h1>Sales Wallboard</h1>
            <p>لوحة تحكم اجتماعات المبيعات — أوامر الشبكة</p>
            <button id="start-btn">ابدأ العرض</button>
        </div>
    </div>

    <!-- 2. Main App Content (Hidden until Start) -->
    <div id="app" class="hidden">
        <!-- Main App Header -->
        <header id="app-header">
            <div class="header-content">
                <div class="header-right">
                    <div class="header-logo">🔵</div>
                    <div class="header-text">
                        <h1>أوامر الشبكة</h1>
                        <p>Sales Wallboard</p>
                    </div>
                </div>

                <div class="header-center">
                    <div id="live-clock" class="live-clock">--:--:--</div>
                    <div id="last-updated-seconds" class="sync-text-seconds"></div>
                </div>

                <div class="header-left">
                    <button class="icon-btn" id="header-theme-toggle" title="تبديل الوضع">
                        <i data-lucide="moon"></i>
                    </button>
                    <button class="icon-btn" id="sync-now-btn" title="تحديث يدوي">
                        <i data-lucide="refresh-cw"></i>
                    </button>
                    <button class="icon-btn" id="settings-btn" title="الإعدادات">
                        <i data-lucide="settings"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 3. Toolbar (Search & Filters) -->
        <div id="toolbar" class="toolbar hidden">
            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="search-input" placeholder="بحث بالمشروع، الفريق، التاريخ...">
                <button id="clear-search" class="clear-btn hidden">&times;</button>
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">الكل</button>
                <button class="filter-btn" data-filter="active">القائمة</button>
                <button class="filter-btn" data-filter="completed">المنتهية</button>
                <button class="filter-btn" data-filter="cancelled">الملغية</button>
            </div>
        </div>

        <!-- 4. Hero Section (Countdown) -->
        <section id="hero-section" class="hero-section hidden">
            <div class="hero-bg-glow"></div>
            <div id="hero-container" class="hero-container">
                <!-- Injected by main.js -->
            </div>
        </section>

        <!-- 5. Main Content (Meetings List) -->
        <main id="meetings-main">
            <div id="meetings-container">
                <!-- Groups and rows injected by main.js -->
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <span>جاري تحميل البيانات...</span>
                </div>
            </div>
        </main>

        <!-- 6. Footer / Sync Status -->
        <footer id="app-footer">
            <div class="sync-badge">
                <span class="sync-dot live"></span>
                <span class="sync-text">متصل</span>
                <span id="last-sync-time" class="sync-time">آخر تحديث: --:--</span>
            </div>
        </footer>
    </div>

    <!-- 7. Notification Container (Toasts) -->
    <div id="notification-container" class="notification-container"></div>

    <!-- 8. Settings Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ الإعدادات</h2>
                <button id="close-modal-btn" class="icon-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-group">
                    <label>Google Sheets Publish Key (CSV)</label>
                    <input type="text" id="sheet-id-input" placeholder="2PACX-...">
                    <small class="input-hint">تأكد من نشر الجدول بصيغة CSV ووضع الرابط/الكود هنا.</small>
                </div>

                <div class="settings-grid">
                    <div class="settings-item">
                        <label>تنبيهات صوتية</label>
                        <input type="checkbox" id="sound-toggle" checked>
                    </div>
                    <div class="settings-item">
                        <label>الوضع الفاتح</label>
                        <input type="checkbox" id="theme-toggle">
                    </div>
                    <div class="settings-item">
                        <label>تحديث كل (دقائق)</label>
                        <select id="refresh-interval">
                            <option value="0.16">10 ثواني (الأفضل للـ Wallboard)</option>
                            <option value="0.5">30 ثانية</option>
                            <option value="1">1 دقيقة</option>
                            <option value="5">5 دقائق</option>
                        </select>
                    </div>
                </div>

                <button id="save-settings-btn" class="btn-primary">حفظ الإعدادات</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/src/main.js"></script>
</body>

</html>
