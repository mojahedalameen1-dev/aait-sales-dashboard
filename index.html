<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AAIT — Sales Dashboard</title>
  <link rel="icon" href="/logo.svg" />
  <link rel="stylesheet" href="/src/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

  <!-- 1. System Overlay (Audio/Start) -->
  <div id="start-overlay">
    <img src="/logo.svg" alt="AAIT Logo" class="logo-large" />
    <h1 style="font-size: 2rem; font-weight: 700;">أوامر الشبكة</h1>
    <p style="color: var(--text-muted);">نظام مراقبة المبيعات — Cinematic Edition</p>
    <button id="start-btn" class="btn-start">تشغيل النظام</button>
  </div>

  <!-- 2. Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; margin-bottom:var(--s6);">
        <h2 style="font-weight: 700;">⚙️ الإعدادات</h2>
        <button id="close-modal-btn" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.5rem;">&times;</button>
      </div>
      
      <div style="display:flex; flex-direction:column; gap:var(--s4);">
        <div>
          <label style="display:block; font-size:var(--t-xs); color:var(--text-muted); margin-bottom:var(--s1);">Google Sheet ID</label>
          <input type="text" id="sheet-id-input" style="width:100%; padding:var(--s3); background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-md); color:white;" />
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center;">
          <label>التنبيهات الصوتية</label>
          <input type="checkbox" id="sound-toggle" checked />
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center;">
          <label>الوضع الفاتح ☀️</label>
          <input type="checkbox" id="theme-toggle" />
        </div>

        <div>
          <label style="display:block; font-size:var(--t-xs); color:var(--text-muted); margin-bottom:var(--s1);">تحديث البيانات</label>
          <select id="refresh-interval" style="width:100%; padding:var(--s3); background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-md); color:white;">
            <option value="0.25">15 ثانية (لحظي)</option>
            <option value="0.5" selected>30 ثانية</option>
            <option value="1">1 دقيقة</option>
            <option value="5">5 دقائق</option>
          </select>
        </div>
      </div>
      
      <button id="save-settings-btn" style="width:100%; margin-top:var(--s6); padding:var(--s4); background:var(--accent); color:white; border:none; border-radius:var(--r-md); font-weight:700; cursor:pointer;">حفظ الإعدادات</button>
    </div>
  </div>

  <!-- 3. Main App Shell -->
  <div id="app" class="app-shell hidden">
    
    <!-- ZONE 1: TOP BAR -->
    <header class="top-bar">
      <div class="top-bar-right">
        <div class="brand-wrapper">
          <img src="/logo.svg" alt="Logo" class="brand-logo" />
          <span class="brand-name">أوامر الشبكة</span>
        </div>
        <div class="sync-status" id="sync-status">
          <span class="pulsing-dot sync-dot"></span>
          <span class="sync-text">متصل</span>
        </div>
      </div>

      <div class="top-bar-center">
        <div id="live-clock" class="live-clock">--:--:--</div>
      </div>

      <div class="top-bar-left">
        <!-- Minimal Toolbar -->
        <div id="toolbar" class="hidden" style="display:flex; align-items:center; gap:var(--s2);">
             <div class="filter-group" style="display:flex; gap:4px; margin-left:var(--s4);">
                <button class="filter-btn active" data-filter="all">الكل</button>
                <button class="filter-btn" data-filter="active">نشط</button>
                <button class="filter-btn" data-filter="completed">تم</button>
             </div>
             <input type="text" id="search-input" placeholder="بحث..." style="background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-full); padding:4px 12px; color:white; font-size:0.8rem; width:120px;" />
             <button id="clear-search" class="hidden" style="background:none; border:none; color:var(--text-muted); cursor:pointer;">&times;</button>
        </div>
        
        <button id="header-theme-toggle" style="background:none; border:none; color:var(--text-muted); cursor:pointer; display:flex; align-items:center;">
          <i data-lucide="moon"></i>
        </button>
        <button id="sync-now-btn" style="background:none; border:none; color:var(--text-muted); cursor:pointer; display:flex; align-items:center;">
          <i data-lucide="refresh-cw"></i>
        </button>
        <button id="settings-btn" style="background:none; border:none; color:var(--text-muted); cursor:pointer; display:flex; align-items:center;">
          <i data-lucide="settings"></i>
        </button>
      </div>
    </header>

    <!-- ZONE 2: HERO CENTER -->
    <main class="hero-center" id="hero-section">
      <!-- Sub-Zone Left: Stats -->
      <div class="sub-zone-left" id="daily-stats-container">
        <!-- KPI Chips will be injected here -->
      </div>

      <!-- Sub-Zone Center: Main Meeting -->
      <div class="sub-zone-center" id="hero-container">
        <!-- Current/Next meeting injected here -->
      </div>

      <!-- Sub-Zone Right: Mini Timeline -->
      <div class="sub-zone-right" id="mini-timeline">
        <!-- Minimal upcoming list -->
      </div>
    </main>

    <!-- ZONE 3: TIMELINE STRIP -->
    <footer class="timeline-strip" id="meetings-container">
      <!-- Horizontal tiles injected here -->
    </footer>

    <!-- Invisible Metadata / Footer -->
    <div style="position:fixed; bottom:var(--s2); right:var(--s4); font-size:10px; color:var(--text-faint); display:flex; gap:var(--s4);">
      <span id="last-sync-time">تحديث: --</span>
      <span id="last-updated-seconds">(0ث)</span>
    </div>

    <!-- Notifications -->
    <div id="notification-container" style="position:fixed; top:var(--s4); left:var(--s4); z-index:3000;"></div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
