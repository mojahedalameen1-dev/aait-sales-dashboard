<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوامر الشبكة — لوحة تحكم المبيعات</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
</head>

<body class="dark-mode">

    <!-- Settings Modal -->
    <div id="settings-modal">
        <div class="modal-body">
            <h2>⚙️ إعدادات الربط</h2>
            <p style="margin-bottom: 1rem; color: var(--text-dim);">أدخل معرّف النشر (Google Sheets Publish Key):</p>
            <input type="text" id="sheet-key-input" placeholder="2PACX-...">
            <div class="modal-actions">
                <button class="btn-prime" onclick="window.saveSettings()">حفظ وتحديث</button>
                <button class="btn-cancel" onclick="window.toggleSettings()">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo-section">
            <img src="/logo.svg" alt="Logo">
            <h1>أوامر الشبكة</h1>
        </div>

        <div class="clock-section">
            <div id="live-clock" class="en-nums">--:--:--</div>
            <div id="live-date">-- --- ----</div>
        </div>

        <div class="next-meeting-countdown">
            <span class="countdown-label">متبقى على الاجتماع القادم :</span>
            <div id="countdown-timer" class="en-nums">00:00</div>
            <div id="meeting-now-badge">الاجتماع جاري الآن</div>

            <div id="sidebar-meeting-details" class="sidebar-meeting-details">
                <div class="title" id="side-m-title">--</div>
                <div class="meta" id="side-m-meta">--</div>
            </div>
        </div>

        <div class="stats-section">
            <div class="stat-card">
                <span class="val en-nums" id="stat-total">0</span>
                <span class="lbl">إجمالي</span>
            </div>
            <div class="stat-card">
                <span class="val en-nums" id="stat-done">0</span>
                <span class="lbl">مكتمل</span>
            </div>
            <div class="stat-card">
                <span class="val en-nums" id="stat-pending">0</span>
                <span class="lbl">قادم</span>
            </div>
            <div class="stat-card">
                <span class="val en-nums" id="stat-urgent">0</span>
                <span class="lbl">جاري الآن</span>
            </div>
        </div>

        <div class="controls">
            <button class="icon-btn" id="refresh-now-btn" title="تحديث" onclick="window.manualRefresh()">
                <i data-lucide="refresh-cw"></i>
            </button>
            <button class="icon-btn" id="theme-toggle-btn" title="تبديل الوضع" onclick="window.toggleTheme()">
                <i data-lucide="moon"></i>
            </button>
            <button class="icon-btn" id="sound-toggle-btn" title="كتم الصوت" onclick="window.toggleSound()">
                <i data-lucide="volume-2"></i>
            </button>
            <button class="icon-btn" id="settings-toggle-btn" title="الإعدادات" onclick="window.toggleSettings()">
                <i data-lucide="settings"></i>
            </button>
        </div>
    </aside>

    <!-- Main Grid -->
    <main class="main-content">
        <div id="meetings-grid">
            <!-- Cards injected here by main.js -->
        </div>
    </main>

    <!-- Notifications Container -->
    <div id="notification-container"></div>

    <!-- Entry Point -->
    <script type="module" src="/src/main.js"></script>
</body>

</html>
