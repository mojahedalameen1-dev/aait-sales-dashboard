<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوامر الشبكة — لوحة تحكم المبيعات</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Palette */
            --bg-deep: #05080a;
            --bg-sidebar: #0a1118;
            --text-white: #ffffff;
            --text-dim: #94a3b8;

            /* Developer Colors - Ultra Polished */
            --color-ashraf: linear-gradient(135deg, #0c7036, #1de9b6);
            --color-mojahed: linear-gradient(135deg, #2962FF, #00B0FF);
            --color-shady: linear-gradient(135deg, #C6242C, #9B1B22);
            --color-hossam: linear-gradient(135deg, #ff6f009f, #FFAB00);

            /* Status Colors */
            --color-urgent: #ef4444;
            --color-pending: #3b82f6;
            --color-done: #22c55e;

            --radius-lg: 20px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light-mode {
            --bg-deep: #f0f2f5;
            --bg-sidebar: #ffffff;
            --text-white: #0f172a;
            --text-dim: #64748b;
        }

        /* Essential Contrast Overrides */
        .meeting-card {
            color: #ffffff;
        }

        .meeting-card .card-project,
        .meeting-card .card-developer,
        .meeting-card .card-ticket,
        .meeting-card .meet-indicator,
        .meeting-card .action-btn,
        .meeting-card .move-alert {
            color: #ffffff !important;
        }

        .meeting-card .card-time {
            color: #000 !important;
            background: #fff;
        }

        .light-mode .sidebar h1,
        .light-mode .sidebar #live-clock {
            color: var(--text-white) !important;
            -webkit-text-fill-color: var(--text-white) !important;
        }

        /* Prevent any URL text showing in cards */
        .meeting-card a:not(.action-btn) {
            display: none !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-white);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            /* ZERO SCROLL */
            display: flex;
            transition: background-color 0.5s ease;
        }

        /* --- Layout --- */
        .sidebar {
            width: 25%;
            height: 100vh;
            background: var(--bg-sidebar);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 2.5rem;
            position: relative;
            z-index: 10;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
        }

        .main-content {
            width: 75%;
            height: 100vh;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow: hidden;
        }

        /* --- Sidebar Elements --- */
        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .logo-section img {
            width: 60px;
            filter: drop-shadow(0 0 15px rgba(41, 171, 226, 0.4));
        }

        .logo-section h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to left, #fff, #5eead4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .clock-section {
            margin-bottom: 2rem;
            text-align: center;
        }

        #live-clock {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        #live-date {
            font-size: 1.2rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        .next-meeting-countdown {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem 1.5rem;
            background: rgba(41, 98, 255, 0.03);
            border-radius: 50%;
            aspect-ratio: 1/1;
            border: 2px solid rgba(41, 98, 255, 0.1);
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
            box-shadow: 
                0 0 30px rgba(0, 0, 0, 0.2),
                inset 0 0 20px rgba(41, 98, 255, 0.05);
            animation: radar-pulse 4s infinite ease-in-out;
        }

        @keyframes radar-pulse {
            0% { box-shadow: 0 0 0 0 rgba(41, 98, 255, 0.2), inset 0 0 20px rgba(41, 98, 255, 0.05); }
            50% { box-shadow: 0 0 40px rgba(41, 98, 255, 0.1), inset 0 0 40px rgba(41, 98, 255, 0.1); }
            100% { box-shadow: 0 0 0 0 rgba(41, 98, 255, 0.2), inset 0 0 20px rgba(41, 98, 255, 0.05); }
        }

        .countdown-label {
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        #countdown-timer {
            font-family: 'Outfit', sans-serif;
            font-size: 5.5rem;
            font-weight: 800;
            color: var(--text-white);
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            transition: var(--transition);
        }

        #meeting-now-badge {
            display: none;
            background: var(--color-urgent);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            animation: pulse-red 2s infinite;
        }

        .sidebar-meeting-details {
            display: none;
            margin-top: 1.5rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }

        .sidebar-meeting-details .title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .sidebar-meeting-details .meta {
            color: var(--text-dim);
            font-size: 1rem;
        }

        .stats-section {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            flex: 1;
            padding: 1rem;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.03);
            text-align: center;
        }

        .stat-card .val {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            display: block;
        }

        .stat-card .lbl {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .controls {
            display: flex;
            gap: 0.8rem;
            margin-top: auto;
        }

        .icon-btn {
            flex: 1;
            height: 50px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* --- Meetings Grid --- */
        #meetings-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 1fr;
            align-content: stretch;
            justify-items: stretch;
            gap: 20px;
            height: 100%;
            min-height: 0;
            overflow: hidden;
            padding: 2.5rem 0.5rem; /* لمنع القص من الأعلى والأسفل ولتوفير مساحة للظلال */
        }

        /* Compact Text System */
        .grid-is-crowded {
            --card-font-size: clamp(0.7rem, 1vw, 1.1rem);
            --card-title-size: clamp(0.9rem, 1.2vw, 1.4rem);
        }

        #meetings-grid:not(.grid-is-crowded) {
            --card-font-size: 1.1rem;
            --card-title-size: 1.8rem;
        }

        .meeting-card {
            border-radius: var(--radius-lg);
            padding: clamp(1rem, 5cqw, 1.5rem);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            transition: var(--transition);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            width: 100%;
            cursor: default;
            container-type: inline-size;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- New Card Design Blocks --- */
        .card-bg-pattern {
            position: absolute;
            inset: -150px;
            background-image: url("data:image/svg+xml,%3Csvg width='150' height='150' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,75 L75,0 L150,75 L75,150 Z' fill='none' stroke='rgba(255,255,255,0.06)' stroke-width='1'/%3E%3Cpath d='M37.5,37.5 L112.5,112.5 M112.5,37.5 L37.5,112.5' stroke='rgba(255,255,255,0.03)' stroke-width='1'/%3E%3C/svg%3E");
            background-size: 150px 150px;
            z-index: 0;
            pointer-events: none;
            animation: bg-drift 40s infinite alternate ease-in-out;
        }

        @keyframes bg-drift {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(10deg) scale(1.1); }
        }

        .card-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-start;
        }

        .mc-title {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-size: clamp(1rem, 10cqw, 1.8rem);
            font-weight: 700;
            margin-bottom: 0.1rem;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            line-height: 1.2;
            color: #fff;
        }
        
        .mc-subtitle {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-size: clamp(0.75rem, 1.1vw, 0.95rem);
            line-height: 1.5;
            opacity: 0.85;
            text-align: center;
            margin-bottom: clamp(0.5rem, 5cqw, 1rem);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: normal;
        }

        .mc-time {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            font-size: clamp(1.4rem, 18cqw, 2.8rem);
            font-weight: 800;
            margin-bottom: clamp(0.4rem, 8cqw, 1.5rem);
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            margin-top: auto;
        }
        
        .mc-time i {
            width: 32px;
            height: 32px;
            color: #dbb360;
        }

        .mc-time .en-nums {
            font-family: 'Outfit', sans-serif;
        }

        .mc-blocks {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            width: 100%;
            margin-top: auto;
            position: relative;
            z-index: 40;
        }

        .mc-block {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: clamp(0.4rem, 4cqw, 1rem);
            display: flex;
            flex-direction: column;
            gap: clamp(0.3rem, 3cqw, 0.8rem);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .mc-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 700;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .mc-block-header span.en-nums {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
        }

        .mc-btn {
            position: relative;
            z-index: 50; /* تأكيد الطبقة العليا للضغط */
            padding: 0.75rem;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            width: 100%;
            pointer-events: auto !important; /* ضمان استجابة الضغط */
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }

        .gold-btn {
            background: linear-gradient(to bottom, #dcb96f, #b38b37);
            color: #2b1f06 !important;
            border: none;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.3);
            font-weight: 800;
            font-size: clamp(0.7rem, 7cqw, 1.15rem);
            text-shadow: 0 1px 1px rgba(255,255,255,0.4);
        }

        .gold-btn.not-available {
            background: linear-gradient(to bottom, #475569, #1e293b);
            color: #94a3b8 !important;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.8;
            pointer-events: none;
        }

        .gold-btn.not-available .btn-icon, .gold-btn.not-available i {
             color: #94a3b8 !important;
        }

        .gold-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .gold-btn .btn-icon, .gold-btn i {
             color: #2b1f06 !important;
        }

        .move-alert {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            background: #ef4444;
            color: #fff;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            animation: pulse-red 1.5s infinite;
            z-index: 20;
        }

        .copy-toast {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: #fff;
            padding: 0.2rem 0.6rem;
            border-radius: 5px;
            font-size: 0.7rem;
            pointer-events: none;
            opacity: 0;
            transition: 0.3s;
        }

        .copy-toast.show {
            opacity: 1;
            top: -35px;
        }

        .meeting-card.completed {
            opacity: 0.6;
            filter: grayscale(0.6) brightness(0.85);
        }

        .completed-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
            opacity: 0.2;
            color: #fff;
            display: none;
        }

        .meeting-card.completed .completed-icon {
            display: block;
        }

        .meeting-card.current {
            border: 5px solid #fff;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
            z-index: 5;
            animation: card-glow 3s infinite;
        }

        .compact .mc-title { font-size: 1.5rem; }
        .compact .mc-time { font-size: 2.2rem; margin-bottom: 1rem; }
        .compact .mc-block { padding: 0.6rem; gap: 0.6rem; }
        .compact .mc-btn { padding: 0.5rem; }

        /* --- Settings Modal --- */
        #settings-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-body h2 {
            margin-bottom: 1.5rem;
            font-weight: 800;
        }

        .modal-body input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            margin-bottom: 1.5rem;
            font-family: inherit;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-prime {
            flex: 1;
            padding: 1rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            background: var(--color-pending);
            color: #fff;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            padding: 1rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        /* --- Animations --- */
        @keyframes pulse-red {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 20px rgba(239, 68, 68, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        @keyframes card-glow {
            0% {
                box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            }

            50% {
                box-shadow: 0 0 60px rgba(255, 255, 255, 0.5);
            }

            100% {
                box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            }
        }

        .en-nums {
            font-variant-numeric: tabular-nums;
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="dark-mode">

    <!-- Settings Modal -->
    <div id="settings-modal">
        <div class="modal-body">
            <h2>⚙️ إعدادات الربط</h2>
            <p style="margin-bottom: 1rem; color: var(--text-dim);">أدخل معرّف النشر (Google Sheets Publish Key):</p>
            <input type="text" id="sheet-key-input" placeholder="2PACX-...">
            <div class="modal-actions">
                <button class="btn-prime" onclick="saveSettings()">حفظ وتحديث</button>
                <button class="btn-cancel" onclick="toggleSettings()">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo-section">
            <img src="/logo.svg" alt="Logo">
            <h1>أوامر الشبكة</h1>
        </div>

        <div class="clock-section">
            <div id="live-clock" class="en-nums">--:--:--</div>
            <div id="live-date">-- --- ----</div>
        </div>

        <div class="next-meeting-countdown">
            <span class="countdown-label">متبقى على الاجتماع القادم :</span>
            <div id="countdown-timer" class="en-nums">00:00</div>
            <div id="meeting-now-badge">الاجتماع منعقد الآن</div>

            <div id="sidebar-meeting-details" class="sidebar-meeting-details">
                <div class="title" id="side-m-title">--</div>
                <div class="meta" id="side-m-meta">--</div>
            </div>
        </div>

        <div class="stats-section">
            <div class="stat-card">
                <span class="val en-nums" id="stat-total">0</span>
                <span class="lbl">إجمالي</span>
            </div>
            <div class="stat-card">
                <span class="val en-nums" id="stat-done">0</span>
                <span class="lbl">مكتمل</span>
            </div>
            <div class="stat-card">
                <span class="val en-nums" id="stat-pending">0</span>
                <span class="lbl">قادم</span>
            </div>
            <div class="stat-card">
                <span class="val en-nums" id="stat-urgent">0</span>
                <span class="lbl">عاجل</span>
            </div>
        </div>

        <div class="controls">
            <button class="icon-btn" id="refresh-now-btn" title="تحديث" onclick="manualRefresh()">
                <i data-lucide="refresh-cw"></i>
            </button>
            <button class="icon-btn" id="theme-toggle-btn" title="تبديل الوضع" onclick="toggleTheme()">
                <i data-lucide="moon"></i>
            </button>
            <button class="icon-btn" id="sound-toggle-btn" title="كتم الصوت" onclick="toggleSound()">
                <i data-lucide="volume-2"></i>
            </button>
            <button class="icon-btn" id="settings-toggle-btn" title="الإعدادات" onclick="toggleSettings()">
                <i data-lucide="settings"></i>
            </button>
        </div>
    </aside>

    <!-- Main Grid -->
    <main class="main-content">
        <div id="meetings-grid">
            <!-- Cards injected here -->
        </div>
    </main>

    <script>
        const DEFAULT_KEY = '2PACX-1vRMptn5kgbKPmukUxf-9os30G_B3HpvenSged4a5D3GcIS8UgAu9inlHRwe2gq28A';
        const GIDS = {
            '2026-02': '951085024',
            '2026-03': '1826079126',
            '2026-04': '507439430',
        };

        let activeMeetings = [];
        let csvKey = localStorage.getItem('sheet_key') || DEFAULT_KEY;

        function toEn(str) {
            if (!str) return '0';
            return str.toString().replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d));
        }

        function formatTime12h(time24) {
            if (!time24) return '--:--';
            try {
                const [hStr, mStr] = time24.split(':');
                let h = parseInt(hStr, 10);
                const suffix = h < 12 ? 'ص' : 'م';
                h = h % 12 || 12;
                return toEn(`${h}:${mStr}`) + ' ' + suffix;
            } catch (e) { return toEn(time24); }
        }

        function getTodayDateStr() {
            const now = new Date();
            return `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
        }

        function isDone(status) {
            if (!status) return false;
            const s = status.trim();
            // البحث عن كلمات الإنجاز بمرونة كاملة
            const doneKeywords = /تم|نجاح|مكتمل|منتهي|خلص|تمت|خلصنا|complete|done|finish/i;
            if (/لم يتم|not|fail/i.test(s)) return false;
            return doneKeywords.test(s);
        }

        function isCancelled(status) {
            if (!status) return false;
            const s = status.trim().toLowerCase();
            return /ملغ|لم يتم|cancel|postpone|مؤجل|اعتذار/i.test(s);
        }

        function getDeveloperGradient(team) {
            const t = (team || '').toLowerCase();
            if (/أشرف|اشرف|ashraf/i.test(t)) return 'linear-gradient(135deg, #00C853, #1de9b6)';
            if (/مجاهد|mojahed/i.test(t)) return 'linear-gradient(135deg, #2962FF, #00B0FF)';
            if (/شادي|shady/i.test(t)) return 'linear-gradient(135deg, #C6242C, #9B1B22)';
            if (/حسام|hossam/i.test(t)) return 'linear-gradient(135deg, #FF6D00, #FFAB00)';
            return 'linear-gradient(135deg, #334155, #1e293b)';
        }

        function getMeetingType(m) {
            const typeStr = (m.meetType || '').toLowerCase();
            if (typeStr.includes('خارجي')) return 'external';
            if (typeStr.includes('حضوري') || typeStr.includes('مكتب') || typeStr.includes('مقر')) return 'in-person';
            if (typeStr.includes('عن بعد') || typeStr.includes('اونلاين')) return 'remote';

            // Fallback to link detection if meetType is empty
            if (m.link && /^https?:\/\//i.test(m.link)) return 'remote';
            return 'in-person';
        }

        // صوت تنبيه مُولَّد برمجياً (لا يحتاج ملف خارجي)
        let alertedMeetings = new Set();
        let audioEnabled = false;

        async function initAudio() {
            audioEnabled = true;
            console.log("Audio Enabled");
            document.removeEventListener('click', initAudio);
        }
        document.addEventListener('click', initAudio);

        function playMeetingAlert(team, minutes) {
            if (!soundEnabled || !audioEnabled) return;
            
            const t = (team || '').toLowerCase();
            let prefix = 'a'; // Default Ashraf
            if (t.includes('مجاهد') || t.includes('mojahed')) prefix = 'm';
            if (t.includes('شادي') || t.includes('shady')) prefix = 's';
            // Hossam already defaults to 'a' logic

            const soundPath = `/sounds/${prefix}${minutes}.mp3`;
            const audio = new Audio(soundPath);
            audio.play().catch(e => console.warn("Audio play failed:", e));
        }

        function playAlert() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) { console.log('Audio not available'); }
        }

        async function fetchCSV() {
            const now = new Date();
            const key = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            const gid = GIDS[key] || Object.values(GIDS).pop();
            const url = `https://docs.google.com/spreadsheets/d/e/${csvKey}/pub?gid=${gid}&single=true&output=csv`;

            try {
                const res = await fetch(`${url}&_t=${Date.now()}`);
                const text = await res.text();
                return parseCSV(text);
            } catch (err) {
                console.error('Fetch error:', err);
                return [];
            }
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const rows = lines.map(line => {
                const fields = [];
                let current = '', q = false;
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    if (ch === '"') {
                        if (q && i + 1 < line.length && line[i + 1] === '"') { current += '"'; i++; }
                        else q = !q;
                    } else if (ch === ',' && !q) { fields.push(current.trim()); current = ''; }
                    else current += ch;
                }
                fields.push(current.trim()); return fields;
            });
            return mapRows(rows);
        }

        function mapRows(rows) {
            const meetings = []; let cDate = '';

            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r || r.length < 2) continue;

                // تحديث التاريخ إذا كان موجوداً
                const df = (r[0] || '').trim();
                if (df && /\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(df)) {
                    cDate = normalizeDate(df);
                    if (!r[1]) continue;
                } else if (df && /\d/.test(df) && (df.includes('/') || df.includes('-'))) {
                    cDate = normalizeDate(df);
                }

                const pRaw = (r[1] || '').trim();  // Project info
                const ts = (r[3] || '').trim(); // Time
                if (!pRaw && !ts) continue;

                // تنظيف اسم المشروع من أي روابط مسربة (Regex قوي)
                const p = pRaw.replace(/https?:\/\/[^\s,؛]+/g, '')
                    .replace(/www\.[^\s,؛]+/g, '')
                    .replace(/[a-z0-9.-]+\.sa\/[^\s,؛]*/gi, '')
                    .trim();

                const teamName = (r[2] || '').trim();
                const meetingMethod = (r[4] || '').trim();  // عن بعد، حضوري، خارجي
                const statusState = (r[5] || '').trim();
                const meetUrl = (r[7] || '').trim();       // رابط جوجل ميت

                // استخراج كود التذكرة (AA) بشكل دقيق
                let ticketCode = '';
                const match = pRaw.match(/AA\d+/i);
                if (match) ticketCode = match[0].toUpperCase();

                meetings.push({
                    date: cDate,
                    project: p,
                    team: teamName,
                    time: parseTimeStr(ts),
                    link: meetUrl,
                    meetType: meetingMethod,
                    status: statusState,
                    ticket: ticketCode
                });
            }
            return meetings;
        }

        function parseTimeStr(ts) {
            if (!ts) return '';
            let val = ts.trim();
            const pm = /pm|م|مساء/i.test(val), am = /am|ص|صباح/i.test(val);
            val = val.replace(/[^\d:]/g, '');
            const m = val.match(/^(\d{1,2}):(\d{2})$/);
            if (m) {
                let h = parseInt(m[1]), mm = m[2];
                if (!pm && !am) { if (h < 10) h += 12; }
                else { if (pm && h < 12) h += 12; if (am && h === 12) h = 0; }
                return `${String(h).padStart(2, '0')}:${mm}`;
            }
            return ts;
        }

        function normalizeDate(ds) {
            const p = ds.split(/[/\-]/);
            if (p.length === 3) {
                const [p0, p1, p2] = p.map(x => x.trim());
                if (p0.length === 4) return `${p0}/${p1.padStart(2, '0')}/${p2.padStart(2, '0')}`;
                if (p2.length === 4) return `${p2}/${p1.padStart(2, '0')}/${p0.padStart(2, '0')}`;
            }
            return ds;
        }

        function renderUI(meetings) {
            const today = getTodayDateStr();
            const filtered = meetings.filter(m => m.date === today && !isCancelled(m.status));
            const grid = document.getElementById('meetings-grid');
            grid.innerHTML = '';

            // التوزيع الذكي للصفوف لضمان Zero Scroll مع وضع الـ Portrait
            if (filtered.length > 12) grid.classList.add('grid-is-crowded');
            else grid.classList.remove('grid-is-crowded');

            const now = new Date();
            const nowMins = now.getHours() * 60 + now.getMinutes();
            let current = null;
            let pending = filtered
                .filter(m => !isDone(m.status))
                .map(m => { const [h, mi] = m.time.split(':').map(Number); return { m, mins: h * 60 + mi }; })
                .sort((a, b) => a.mins - b.mins);

            const match = pending.find(x => x.mins >= nowMins - 30);
            if (match) current = match.m;

            filtered.forEach(m => {
                const done = isDone(m.status), curr = current && m === current;
                const type = getMeetingType(m);
                const fullTicket = m.ticket || ''; // Already clean e.a. AA62338

                const card = document.createElement('div');
                card.className = `meeting-card ${done ? 'completed' : ''} ${curr ? 'current' : ''}`;
                card.style.background = getDeveloperGradient(m.team);

                let alertUI = '';

                // Logic for Meeting Alerts (30m & 5m)
                const [h, mi] = m.time.split(':').map(Number);
                const target = new Date(); target.setHours(h, mi, 0, 0);
                const diffMins = Math.floor((target - now) / 60000);

                if (!done) {
                    // External Move Alert
                    if (type === 'external' && diffMins > 0 && diffMins <= 30) {
                        alertUI = `<div class="move-alert">🚗 حان وقت التحرك</div>`;
                    }

                    // Voice Alerts (30m and 5m)
                    [30, 5].forEach(interval => {
                        const alertKey = `${m.project}-${m.time}-${interval}`;
                        if (diffMins === interval && !alertedMeetings.has(alertKey)) {
                            playMeetingAlert(m.team, interval);
                            alertedMeetings.add(alertKey);
                        }
                    });
                }

                let blocksHTML = '';
                
                // Google Meet Block (Always show if link exists, or show notice if remote and missing link)
                if (m.link && m.link.startsWith('http')) {
                    blocksHTML += `
                    <div class="mc-block meet-block">
                        <div class="mc-block-header">
                            <span>انضم إلى جوجل ميت</span>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M21.0583 6.91429L16.223 9.47955V7.47649C16.2195 6.48161 15.4124 5.67756 14.4173 5.6811L3.63397 5.73359C2.63908 5.73713 1.83503 6.54425 1.8315 7.53913L1.758 22.6514C1.75446 23.6463 2.56158 24.4503 3.55646 24.4468L14.3398 24.3943C15.3347 24.3908 16.1387 23.5837 16.1423 22.5888V20.5857L21.0526 23.109C21.7317 23.4566 22.5611 22.9557 22.5562 22.1914L22.464 7.82281C22.459 7.05856 21.6247 6.5658 20.9507 6.92211C20.9856 6.9161 21.0219 6.9114 21.0583 6.91429Z" fill="#00832d"/><path d="M16.223 9.47955V15.5459L22.5562 22.1914V7.82281L16.223 9.47955Z" fill="#00aa4b"/><path d="M16.1423 22.5888C16.1387 23.5837 15.3347 24.3908 14.3398 24.3943H3.55646C2.56158 24.4503 1.75446 23.6463 1.758 22.6514V17.5888H16.1423V22.5888Z" fill="#ffba00"/><path d="M16.1423 17.5888H1.758V7.53913L16.1423 17.5888Z" fill="#2684fc"/><path d="M1.758 7.53913C1.8315 6.54425 2.63908 5.73713 3.63397 5.73359H14.4173C15.4124 5.67756 16.2195 6.48161 16.223 7.47649V17.5888L1.758 7.53913Z" fill="#e94235"/></svg>
                        </div>
                        <a href="${m.link}" target="_blank" class="mc-btn action-btn gold-btn">دخول <i data-lucide="video" style="width: 18px; margin-right: 5px;"></i></a>
                    </div>`;
                } else if (type === 'remote') {
                    blocksHTML += `
                    <div class="mc-block meet-block">
                        <div class="mc-block-header">
                            <span>انضم إلى جوجل ميت</span>
                            <i data-lucide="video-off" style="width: 20px; color: #94a3b8;"></i>
                        </div>
                        <div class="mc-btn gold-btn not-available">الرابط غير متوفر</div>
                    </div>`;
                }

                // Slack Block (Always if ticket exists)
                if (fullTicket) {
                    blocksHTML += `
                    <div class="mc-block slack-block">
                        <div class="mc-block-header" style="flex-direction: row-reverse;">
                            <span class="en-nums" dir="ltr">#${fullTicket}</span>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.044 14.887a2.536 2.536 0 10-2.528 2.535h2.528v-2.535z" fill="#E01E5A"/><path d="M6.309 14.887a2.534 2.534 0 105.068 0 2.534 2.534 0 00-5.068 0z" fill="#E01E5A"/><path d="M9.112 5.044a2.536 2.536 0 10-2.535-2.528v2.528h2.535z" fill="#36C5F0"/><path d="M9.112 6.309a2.534 2.534 0 100 5.068 2.534 2.534 0 000-5.068z" fill="#36C5F0"/><path d="M18.956 9.113a2.536 2.536 0 102.528-2.535h-2.528v2.535z" fill="#2EB67D"/><path d="M17.691 9.113a2.534 2.534 0 10-5.068 0 2.534 2.534 0 005.068 0z" fill="#2EB67D"/><path d="M14.888 18.956a2.536 2.536 0 102.535 2.528v-2.528h-2.535z" fill="#ECB22E"/><path d="M14.888 17.691a2.534 2.534 0 100-5.068 2.534 2.534 0 000 5.068z" fill="#ECB22E"/></svg>
                        </div>
                        <button class="mc-btn gold-btn" onclick="copyToSlack(this, '${fullTicket}')">
                            نسخ <i data-lucide="copy" class="btn-icon" style="width: 18px; margin-right: 5px;"></i>
                            <div class="copy-toast">تم النسخ ✓</div>
                        </button>
                    </div>`;
                }

                card.innerHTML = `
                    <div class="card-bg-pattern"></div>
                    <div class="card-content">
                        ${alertUI}
                        <h2 class="mc-title">اجتماع مع ${m.team || 'مبيعات'}</h2>
                        <div class="mc-subtitle">${m.project}</div>
                        
                        <div class="mc-time">
                            <i data-lucide="clock"></i>
                            <span class="en-nums">${formatTime12h(m.time)}</span>
                        </div>

                        ${blocksHTML ? `<div class="mc-blocks">${blocksHTML}</div>` : ''}
                        
                        <i data-lucide="check" class="completed-icon"></i>
                    </div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('stat-total').textContent = toEn(filtered.length);
            document.getElementById('stat-done').textContent = toEn(filtered.filter(m => isDone(m.status)).length);
            document.getElementById('stat-pending').textContent = toEn(filtered.filter(m => !isDone(m.status)).length);
            document.getElementById('stat-urgent').textContent = toEn(filtered.filter(m => {
                const [h, mi] = m.time.split(':').map(Number);
                const mtime = h * 60 + mi;
                const now = new Date();
                const nowM = now.getHours() * 60 + now.getMinutes();
                return !isDone(m.status) && (mtime - nowM <= 15) && (mtime - nowM > -30);
            }).length);

            lucide.createIcons();
            updateCountdown(current);
        }

        function updateCountdown(meeting) {
            const timer = document.getElementById('countdown-timer');
            const badge = document.getElementById('meeting-now-badge');
            const sideDetails = document.getElementById('sidebar-meeting-details');
            const label = document.querySelector('.countdown-label');

            if (!meeting) {
                timer.textContent = "00:00";
                badge.style.display = 'none';
                sideDetails.style.display = 'none';
                label.textContent = "لا توجد اجتماعات قادمة";
                return;
            }

            label.textContent = "الاجتماع الحالى";
            const now = new Date();
            const [h, mi] = meeting.time.split(':').map(Number);
            const target = new Date(); target.setHours(h, mi, 0, 0);
            const diff = target - now;

            if (diff <= 0) {
                timer.style.display = 'none'; badge.style.display = 'block';
                label.textContent = "الاجتماع الحالي الآن :";
            } else {
                timer.style.display = 'block'; badge.style.display = 'none';
                label.textContent = "متبقى على الاجتماع القادم :";
                const hours = Math.floor(diff / 3600000);
                const mm = Math.floor((diff % 3600000) / 60000);
                const ss = Math.floor((diff % 60000) / 1000);

                let timeStr = "";
                if (hours > 0) {
                    timeStr = `${String(hours).padStart(2, '0')}:${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
                } else {
                    timeStr = `${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
                }

                timer.textContent = toEn(timeStr);

                // UX: Change color to urgent red only if < 15 mins
                if (diff < 15 * 60000) {
                    timer.style.color = "var(--color-urgent)";
                    timer.style.textShadow = "0 0 40px rgba(239, 68, 68, 0.4)";
                } else {
                    timer.style.color = "var(--text-white)";
                    timer.style.textShadow = "0 0 40px rgba(255, 255, 255, 0.1)";
                }

                // Adjust font size if HH:MM:SS
                timer.style.fontSize = hours > 0 ? "4rem" : "5rem";
            }

            sideDetails.style.display = 'block';
            document.getElementById('side-m-title').textContent = meeting.project;
            document.getElementById('side-m-meta').textContent = `${meeting.team} — ${formatTime12h(meeting.time)}`;
        }

        function updateDynamicState() {
            if (!activeMeetings || !activeMeetings.length) {
                updateCountdown(null);
                return;
            }

            const today = getTodayDateStr();
            const filtered = activeMeetings.filter(m => m.date === today && !isCancelled(m.status));
            
            const now = new Date();
            const nowMins = now.getHours() * 60 + now.getMinutes();
            
            let current = null;
            let pending = filtered
                .filter(m => !isDone(m.status))
                .map(m => { const [h, mi] = m.time.split(':').map(Number); return { m, mins: h * 60 + mi }; })
                .sort((a, b) => a.mins - b.mins);

            const match = pending.find(x => x.mins >= nowMins - 30);
            if (match) current = match.m;
            
            updateCountdown(current);
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                const suffix = h < 12 ? 'ص' : 'م';
                h = h % 12 || 12;
                document.getElementById('live-clock').textContent = toEn(`${h}:${m}:${s}`) + ' ' + suffix;
                const dateStr = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                document.getElementById('live-date').textContent = toEn(dateStr);
            }, 1000);
        }

        async function manualRefresh() {
            const btn = document.getElementById('refresh-now-btn');
            btn.style.opacity = "0.5";
            activeMeetings = await fetchCSV();
            renderUI(activeMeetings);
            setTimeout(() => btn.style.opacity = "1", 1000);
        }

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            const icon = document.querySelector('#theme-toggle-btn i');
            if (icon) {
                icon.setAttribute('data-lucide', isLight ? 'sun' : 'moon');
                lucide.createIcons();
            }
        }

        let soundEnabled = localStorage.getItem('sound_enabled') !== 'false';
        function toggleSound() {
            soundEnabled = !soundEnabled;
            localStorage.setItem('sound_enabled', soundEnabled);
            const btn = document.getElementById('sound-toggle-btn');
            if (btn) {
                btn.innerHTML = `<i data-lucide="${soundEnabled ? 'volume-2' : 'volume-x'}"></i>`;
                lucide.createIcons();
            }
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
            document.getElementById('sheet-key-input').value = csvKey;
        }

        function saveSettings() {
            const val = document.getElementById('sheet-key-input').value.trim();
            if (val) {
                csvKey = val; localStorage.setItem('sheet_key', val);
                toggleSettings(); manualRefresh();
            }
        }

        let copyTimers = {};
        function copyToSlack(btn, text) {
            if (btn.classList.contains('locked')) return;

            navigator.clipboard.writeText(text).then(() => {
                const toast = btn.querySelector('.copy-toast');
                const icon = btn.querySelector('.btn-icon');

                // Double click handling
                if (copyTimers[text]) {
                    btn.classList.add('locked');
                    icon.setAttribute('data-lucide', 'check-check');
                    lucide.createIcons();
                    setTimeout(() => {
                        btn.classList.remove('locked');
                        icon.setAttribute('data-lucide', 'copy');
                        lucide.createIcons();
                    }, 3000);
                }

                toast.classList.add('show');
                copyTimers[text] = setTimeout(() => {
                    toast.classList.remove('show');
                    delete copyTimers[text];
                }, 2000);
            });
        }

        window.onload = async () => {
            startClock();
            if (localStorage.getItem('theme') === 'light') toggleTheme();

            // Sync sound icon state
            if (!soundEnabled) {
                const icon = document.querySelector('#sound-toggle-btn i');
                if (icon) icon.setAttribute('data-lucide', 'volume-x');
            }

            activeMeetings = await fetchCSV();
            renderUI(activeMeetings);
            setInterval(async () => { activeMeetings = await fetchCSV(); renderUI(activeMeetings); }, 30000);
            setInterval(() => updateDynamicState(), 1000);
        };
    </script>
